<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#003366">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Drive Assist">
<title>SIMODRIVE 611 — Diagnostic Assistant</title>
<link rel="manifest" href="manifest.json">

<!--
  HOW THIS WORKS
  ==============
  1. Operator visits your GitHub Pages URL once while on factory WiFi
  2. Service worker installs — caches this entire file
  3. Operator taps "Add to Home Screen" — gets an app icon
  4. App calls YOUR FACTORY SERVER (set BACKEND_URL below) for all AI responses
  5. Manuals, fault DB, and Gemma all stay on the server — nothing heavy on phone
  6. If WiFi lost: service worker shows last session from IndexedDB — operator can read history
  7. When WiFi restored: full diagnosis resumes

  SETUP STEP — change this one line to your factory server's IP:
-->
<script>
  const BACKEND_URL = "192.168.1.10";  // ← CHANGE THIS to your laptop's IP
  // Find your laptop IP: open Command Prompt → type ipconfig → look for IPv4 Address
  // Example: http://192.168.1.45:8000
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: #003366;
    color: white;
    padding: 12px 16px 10px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 16px; font-weight: 700; }
  .header p  { font-size: 11px; opacity: 0.75; margin-top: 2px; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    background: white;
    border-bottom: 1px solid #e0e0e0;
    flex-shrink: 0;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.green  { background: #2e7d32; }
  .dot.red    { background: #c62828; }
  .dot.yellow { background: #f57c00; }
  .status-text { font-size: 12px; color: #555; flex: 1; }
  .ticket-pill {
    font-size: 11px; font-weight: 600;
    background: #e3f2fd; color: #0d47a1;
    padding: 2px 10px; border-radius: 12px;
    border: 1px solid #90caf9;
  }
  .close-btn {
    font-size: 11px; background: #003366; color: white;
    border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer;
  }

  /* ── MESSAGES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .bubble {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.55;
    word-wrap: break-word;
  }
  .bubble.user {
    align-self: flex-end;
    background: #1565c0;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .bubble.bot {
    align-self: flex-start;
    background: white;
    color: #212121;
    border: 1px solid #e0e0e0;
    border-bottom-left-radius: 4px;
  }
  .bubble.bot.resolved {
    background: #e8f5e9;
    border-color: #a5d6a7;
  }
  .bubble.bot.escalate {
    background: #ffebee;
    border-color: #ffcdd2;
  }
  .bubble.bot.offline {
    background: #fff8e1;
    border-color: #ffe082;
    font-style: italic;
    color: #5d4037;
  }
  .bubble-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4px;
    opacity: 0.6;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  /* ── STARTERS ── */
  .starters {
    padding: 8px 14px;
    flex-shrink: 0;
  }
  .starters p { font-size: 12px; color: #666; margin-bottom: 6px; }
  .starters-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .starter-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    color: #333;
    white-space: nowrap;
  }
  .starter-btn:active { background: #e3f2fd; }

  /* ── INPUT ── */
  .input-area {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: white;
    border-top: 1px solid #e0e0e0;
    flex-shrink: 0;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    border: 1px solid #ccc;
    border-radius: 20px;
    padding: 10px 14px;
    font-size: 15px;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.4;
    font-family: inherit;
  }
  .input-area textarea:focus { border-color: #003366; }
  .send-btn {
    width: 44px; height: 44px;
    background: #003366;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .send-btn:active { background: #002244; }
  .send-btn svg { width: 20px; height: 20px; fill: white; }
  .send-btn:disabled { background: #ccc; cursor: default; }

  /* ── TYPING INDICATOR ── */
  .typing {
    align-self: flex-start;
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .typing span {
    width: 7px; height: 7px;
    background: #003366;
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-6px); }
  }

  /* ── INSTALL BANNER ── */
  .install-banner {
    background: #e8f5e9;
    border-top: 1px solid #a5d6a7;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .install-banner p { font-size: 13px; color: #1b5e20; flex: 1; }
  .install-btn {
    background: #2e7d32; color: white;
    border: none; padding: 7px 14px;
    border-radius: 8px; font-size: 13px;
    cursor: pointer; font-weight: 600;
    white-space: nowrap;
  }
  .dismiss-btn {
    background: none; border: none;
    color: #666; font-size: 18px; cursor: pointer; padding: 0 4px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>⚙️ SIMODRIVE 611 — Diagnostic Assistant</h1>
  <p>Describe the fault or symptom. The assistant will guide you step by step.</p>
</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="dot" id="status-dot"></div>
  <span class="status-text" id="status-text">Connecting to server...</span>
  <span class="ticket-pill hidden" id="ticket-pill"></span>
  <button class="close-btn hidden" id="close-btn" onclick="closeTicket()">Close</button>
</div>

<!-- INSTALL BANNER (shown when installable) -->
<div class="install-banner hidden" id="install-banner">
  <p>Install this app on your home screen for quick access — works offline too.</p>
  <button class="install-btn" id="install-btn">Install</button>
  <button class="dismiss-btn" onclick="document.getElementById('install-banner').classList.add('hidden')">✕</button>
</div>

<!-- MESSAGES -->
<div class="messages" id="messages"></div>

<!-- STARTER PROMPTS (hidden once conversation starts) -->
<div class="starters" id="starters">
  <p>How would you like to start?</p>
  <div class="starters-row">
    <button class="starter-btn" onclick="sendStarter('The display shows a fault code')">⚠️ Fault code on display</button>
    <button class="starter-btn" onclick="sendStarter('The machine stopped suddenly')">🛑 Machine stopped</button>
    <button class="starter-btn" onclick="sendStarter('There is an unusual noise from the motor')">🔊 Unusual noise</button>
    <button class="starter-btn" onclick="sendStarter('The motor is not turning')">⚡ Motor not turning</button>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <textarea
    id="msg-input"
    placeholder="Type fault code or describe the problem..."
    rows="1"
    oninput="autoResize(this)"
    onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"
  ></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let ticketId   = null;
let isOnline   = false;
let isWaiting  = false;
const DB_NAME  = "simodrive_v1";
const DB_STORE = "messages";

// ─────────────────────────────────────────────────────────────────────────────
// INDEXEDDB — local message store for offline reading
// ─────────────────────────────────────────────────────────────────────────────
let db;
const openDB = () => new Promise((res, rej) => {
  const req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = e => {
    e.target.result.createObjectStore(DB_STORE, {keyPath: "id", autoIncrement: true});
  };
  req.onsuccess = e => { db = e.target.result; res(); };
  req.onerror   = rej;
});

const saveMsg = (role, content, type) => new Promise(res => {
  if (!db) return res();
  const tx = db.transaction(DB_STORE, "readwrite");
  tx.objectStore(DB_STORE).add({role, content, type, ts: Date.now()});
  tx.oncomplete = res;
});

const loadMsgs = () => new Promise(res => {
  if (!db) return res([]);
  const tx = db.transaction(DB_STORE, "readonly");
  const req = tx.objectStore(DB_STORE).getAll();
  req.onsuccess = () => res(req.result || []);
  req.onerror   = () => res([]);
});

const clearMsgs = () => new Promise(res => {
  if (!db) return res();
  const tx = db.transaction(DB_STORE, "readwrite");
  tx.objectStore(DB_STORE).clear();
  tx.oncomplete = res;
});

// ─────────────────────────────────────────────────────────────────────────────
// SERVER HEALTH CHECK
// ─────────────────────────────────────────────────────────────────────────────
async function checkServer() {
  try {
    const r = await fetch(`${BACKEND_URL}/health`, {signal: AbortSignal.timeout(3000)});
    if (r.ok) {
      setStatus("green", "Connected to factory server");
      document.getElementById("send-btn").disabled = false;
      isOnline = true;
      return true;
    }
  } catch {}
  setStatus("red", "No connection — showing last session");
  document.getElementById("send-btn").disabled = true;
  isOnline = false;
  return false;
}

function setStatus(color, text) {
  document.getElementById("status-dot").className = "dot " + color;
  document.getElementById("status-text").textContent = text;
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER A MESSAGE BUBBLE
// ─────────────────────────────────────────────────────────────────────────────
function renderBubble(role, content, type) {
  const el  = document.createElement("div");
  el.className = role === "user" ? "bubble user" : `bubble bot ${type || ""}`;

  const lbl = document.createElement("div");
  lbl.className = "bubble-label";
  lbl.textContent = role === "user" ? "You" : "Assistant";
  el.appendChild(lbl);

  const txt = document.createElement("div");
  txt.innerHTML = content
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n/g, "<br>");
  el.appendChild(txt);

  document.getElementById("messages").appendChild(el);
  el.scrollIntoView({behavior: "smooth", block: "end"});
  return el;
}

function showTyping() {
  const el = document.createElement("div");
  el.className = "typing";
  el.id = "typing";
  el.innerHTML = "<span></span><span></span><span></span>";
  document.getElementById("messages").appendChild(el);
  el.scrollIntoView({behavior: "smooth"});
}
function hideTyping() {
  document.getElementById("typing")?.remove();
}

// ─────────────────────────────────────────────────────────────────────────────
// SEND MESSAGE
// ─────────────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById("msg-input");
  const text  = input.value.trim();
  if (!text || isWaiting) return;

  if (!isOnline) {
    renderBubble("bot",
      "No connection to the factory server.\n\nPlease reconnect to the factory WiFi and try again.\n\nYour previous messages are shown above.",
      "offline");
    return;
  }

  input.value = "";
  input.style.height = "auto";
  document.getElementById("starters").classList.add("hidden");
  isWaiting = true;
  document.getElementById("send-btn").disabled = true;

  renderBubble("user", text, null);
  await saveMsg("user", text, null);
  showTyping();

  try {
    const form = new FormData();
    form.append("query",     text);
    form.append("ticket_id", ticketId ? String(ticketId) : "None");

    const r   = await fetch(`${BACKEND_URL}/ask`, {method: "POST", body: form, signal: AbortSignal.timeout(180000)});
    const res = await r.json();

    hideTyping();
    ticketId = res.ticket_id;

    const type = res.resolved ? "resolved" : res.escalate ? "escalate" : "bot";
    renderBubble("bot", res.answer, type);
    await saveMsg("bot", res.answer, type);

    // Update ticket pill
    if (ticketId) {
      const pill = document.getElementById("ticket-pill");
      pill.textContent = `Ticket #${ticketId}`;
      pill.classList.remove("hidden");
      document.getElementById("close-btn").classList.remove("hidden");
    }

  } catch (err) {
    hideTyping();
    isOnline = false;
    setStatus("red", "Connection lost");
    renderBubble("bot",
      "Lost connection to the factory server.\n\nPlease check your WiFi connection and try again.",
      "offline");
  }

  isWaiting = false;
  document.getElementById("send-btn").disabled = !isOnline;
}

function sendStarter(text) {
  document.getElementById("msg-input").value = text;
  sendMessage();
}

// ─────────────────────────────────────────────────────────────────────────────
// CLOSE TICKET
// ─────────────────────────────────────────────────────────────────────────────
async function closeTicket() {
  if (!ticketId || !isOnline) return;
  await fetch(`${BACKEND_URL}/resolve?ticket_id=${ticketId}`, {method: "POST"}).catch(()=>{});
  await clearMsgs();
  ticketId = null;
  document.getElementById("messages").innerHTML = "";
  document.getElementById("ticket-pill").classList.add("hidden");
  document.getElementById("close-btn").classList.add("hidden");
  document.getElementById("starters").classList.remove("hidden");
  renderBubble("bot", "Ticket closed. Ready for the next issue.", "bot");
}

// ─────────────────────────────────────────────────────────────────────────────
// AUTO-RESIZE TEXTAREA
// ─────────────────────────────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 100) + "px";
}

// ─────────────────────────────────────────────────────────────────────────────
// PWA INSTALL PROMPT
// ─────────────────────────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("install-banner").classList.remove("hidden");
});

document.getElementById("install-btn").addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById("install-banner").classList.add("hidden");
});

// ─────────────────────────────────────────────────────────────────────────────
// SERVICE WORKER REGISTRATION
// ─────────────────────────────────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(err => {
    console.log("SW registration failed:", err);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// STARTUP
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  await openDB();

  const online = await checkServer();

  // Load stored messages so operator can read history offline
  const stored = await loadMsgs();
  if (stored.length > 0) {
    document.getElementById("starters").classList.add("hidden");
    stored.forEach(m => renderBubble(m.role, m.content, m.type));
    if (!online) {
      renderBubble("bot",
        "You are currently offline. The messages above are from your last session.\n\nReconnect to the factory WiFi to continue diagnosing.",
        "offline");
    }
  }

  // Poll server status every 10 seconds
  setInterval(async () => {
    const now = await checkServer();
    if (now && !isOnline) {
      isOnline = true;
      renderBubble("bot", "Connection restored. You can continue the diagnosis.", "bot");
    }
  }, 10000);
}

init();
</script>
</body>
</html>
